name: Test

# Run unit tests on every push and PR; run androidTest (instrumentation) on a
# self-hosted MuMu emulator runner. Unit tests use a fast static CI image; the
# androidTest job targets the `self-hosted, mumu` runner that has the MuMu
# emulator running on 127.0.0.1:7555.
#
# See .github/TESTING.md for how to bring up the MuMu runner.

on:
  push:
    branches: [ master, bugfix/**, feature/**, release/** ]
  pull_request:
    branches: [ master ]

jobs:
  unit-test:
    name: Unit tests (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

  android-test:
    name: Android instrumented tests (MuMu)
    runs-on: [self-hosted, mumu]
    needs: unit-test
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check ADB connection to MuMu
        run: |
          adb connect 127.0.0.1:7555
          adb devices
          adb -s 127.0.0.1:7555 shell getprop ro.build.version.release

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run androidTest on MuMu
        run: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace
        env:
          ADB_SERVER_PORT: 5037

      - name: Disconnect ADB
        if: always()
        run: adb disconnect 127.0.0.1:7555 || true

      - name: Upload androidTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: app/build/reports/androidTests/connected/

  lint:
    name: Lint (ktlint + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*
